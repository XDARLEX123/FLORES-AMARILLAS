<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tree-container">
            <div class="trunk"></div>
            <div class="flowers-heart" id="flowers"></div>
        </div>

        <div class="message">
            <h2>Flores Amarillas para el amor de mi vida:</h2>
            <p id="typed-text">Si pudiera elegir un lugar seguro, sería a tu lado...</p>
            <div class="counter">
                <p>Mi amor por ti comenzó hace...</p>
                <div id="timer">00 días 00 horas 00 minutos 00 segundos</div>
                <h3 id="final-message">¡Te Amo!</h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
